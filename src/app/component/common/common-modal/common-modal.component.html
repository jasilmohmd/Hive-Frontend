<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 animate-fadeIn"
  (click)="onBackdropClick($event)"
  role="presentation"
>
  <div
    #panel
    class="relative w-full max-w-sm rounded-lg bg-surface-900 p-6 text-white shadow-xl ring-1 ring-zinc-700"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="title ? titleId : null"
    [attr.aria-describedby]="message ? messageId : null"
    (click)="$event.stopPropagation()"
    (keydown)="$event.stopPropagation()"
  >
    <h2 *ngIf="title" [id]="titleId" class="mb-4 text-xl font-bold">{{ title }}</h2>
    <p *ngIf="message" [id]="messageId" class="mb-6 text-zinc-300">{{ message }}</p>
    <div class="flex justify-end space-x-2">
      <button
        type="button"
        (click)="cancel()"
        [disabled]="loading"
        class="rounded bg-zinc-700 px-4 py-2 font-semibold text-white hover:bg-zinc-600 disabled:opacity-50 focus-visible:ring-2 focus-visible:ring-brand"
      >
        {{ cancelText || 'Cancel' }}
      </button>
      <button
        type="button"
        (click)="confirm()"
        [disabled]="loading"
        [class]="
          'rounded px-4 py-2 font-semibold text-white disabled:opacity-50 focus-visible:ring-2 focus-visible:ring-brand ' +
          confirmClasses
        "
      >
        <span *ngIf="!loading">{{ confirmText || 'Confirm' }}</span>
        <span *ngIf="loading" class="inline-flex items-center gap-2">
          <svg
            class="h-4 w-4 animate-spin"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
          Wait…
        </span>
      </button>
    </div>
  </div>
</div>
