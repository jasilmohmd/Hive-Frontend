<div class="min-w-full">
  <table class="w-full">
    <thead>
      <tr class="border-b border-gray-700">
        <!-- Data Column Headers -->
        <ng-container *ngFor="let col of columns">
          <th class="px-4 py-2 text-left text-sm font-thin text-zinc-400" 
              [class.w-[200px]]="col.field === 'profilePicture'">
            {{ col.header }}
          </th>
        </ng-container>
        <!-- Empty Header for Actions Column -->
        <th class="px-4 py-2 text-right text-sm font-thin text-zinc-400 w-[120px]"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of data" class="border-b border-gray-700 hover:bg-zinc-900/50 transition-colors">
        <!-- Data Columns -->
        <ng-container *ngFor="let col of columns">
          <td class="px-4 py-2 align-middle">
            <ng-container [ngSwitch]="col.field">
              <!-- Profile Picture Column -->
              <div *ngSwitchCase="'profilePicture'" class="flex items-center">
                <ng-container *ngIf="row.profilePicture; else fallback">
                  <img [src]="row.profilePicture" alt="{{ row.name }}" 
                       class="w-10 h-10 rounded-full object-cover">
                </ng-container>
                <ng-template #fallback>
                  <ng-container *ngIf="showFallbackInitial">
                    <div class="w-10 h-10 bg-slate-500 rounded-full flex items-center justify-center text-lg font-medium">
                      {{ row.name ? (row.name[0] | uppercase) : '' }}
                    </div>
                  </ng-container>
                </ng-template>
              </div>

              <!-- Default Column Content -->
              <div *ngSwitchDefault class="truncate">
                {{ row[col.field] }}
              </div>
            </ng-container>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <td class="px-4 py-2 text-right align-middle">
          <div class="flex items-center justify-end gap-2">
            <div class="flex items-center gap-2">
              <button *ngFor="let act of primaryActions" 
                      (click)="act.action(row)"
                      [ngClass]="act.class"
                      class="p-1.5 rounded-md bg-zinc-600 transition-colors"
                      [title]="act.label">
                <img *ngIf="act.icon" [src]="act.icon" alt="icon" class="w-5 h-5">
                <span *ngIf="!act.icon">{{ act.label }}</span>
              </button>
            </div>
            
            <div class="dropdown-container relative" *ngIf="secondaryActions?.length">
              <app-common-dropdown 
                [items]="secondaryActions" 
                [isOpen]="dropdownOpen === row"
                (isOpenChange)="dropdownOpen = ($event ? row : null)"
                (itemSelected)="onSecondaryAction($event, row)">
              </app-common-dropdown>
            </div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
