<a
  [href]="mapsLink"
  target="_blank"
  rel="noopener noreferrer"
  class="block max-w-xs overflow-hidden rounded-lg border border-zinc-600/50 bg-zinc-900/40 transition-colors hover:border-green-500/50"
>
  <img
    [src]="mapImageUrl"
    [alt]="displayLabel"
    class="h-28 w-full object-cover"
    loading="lazy"
  />
  <span class="flex items-center justify-between gap-2 px-3 py-2 text-sm">
    <span class="truncate font-medium">{{ displayLabel }}</span>
    <span class="shrink-0 text-xs text-green-400">Open in Maps</span>
  </span>
</a>
