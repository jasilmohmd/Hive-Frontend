<!-- Image Cropper Modal -->
<div class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
  <div class="bg-zinc-900 rounded-lg w-full max-w-2xl p-4">
    <image-cropper #cropper
    [imageChangedEvent]="imageChangedEvent"
    [maintainAspectRatio]="true"
    [aspectRatio]="aspectRatio"
    [format]="format"
    (imageLoaded)="onImageLoaded()"
    (cropperReady)="onCropperReady()"
    (imageCropped)="onImageCropped($event)">></image-cropper>
    <div class="flex gap-2 mt-4">
      <button (click)="onCancel()" class="px-4 py-2 bg-zinc-700 rounded-lg hover:bg-zinc-600">
        Cancel
      </button>
      <button (click)="onDone()" class="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-500">
        Done
      </button>
    </div>
  </div>
</div>
