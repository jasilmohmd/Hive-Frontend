<a
  [href]="file.url"
  target="_blank"
  rel="noopener noreferrer"
  class="flex min-w-[12rem] max-w-full items-center gap-3 rounded-lg border border-zinc-600/50 bg-zinc-900/40 px-3 py-2 transition-colors hover:bg-zinc-800/60"
>
  <span
    class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-amber-500/20 text-xs font-bold text-amber-300"
    aria-hidden="true"
  >{{ fileIcon() }}</span>
  <span class="min-w-0 flex-1">
    <span class="block truncate text-sm font-medium">{{ file.name }}</span>
    <span class="text-xs text-zinc-400">{{ formatSize(file.size) }}</span>
  </span>
  <svg class="h-5 w-5 shrink-0 text-zinc-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
  </svg>
</a>
