<div
  class="flex flex-col items-center justify-center text-center text-zinc-400"
  [ngClass]="
    embedded
      ? 'mx-auto max-w-md px-4 py-6'
      : 'rounded-xl border border-zinc-800 bg-zinc-900/50 px-6 py-10'
  "
>
  <img *ngIf="iconSrc" [src]="iconSrc" [alt]="iconAlt || title" class="mb-4 h-16 w-16 opacity-70" />
  <h3 class="text-lg font-medium text-zinc-200">{{ title }}</h3>
  <p *ngIf="description" class="mt-2 max-w-md text-sm">{{ description }}</p>
  <button
    *ngIf="actionLabel"
    type="button"
    class="mt-4 rounded-lg bg-brand px-4 py-2 text-sm font-medium text-surface-950 hover:bg-brand-hover focus-visible:ring-2 focus-visible:ring-brand"
    (click)="onAction()"
  >
    {{ actionLabel }}
  </button>
</div>
