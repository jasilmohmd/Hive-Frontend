<div class="flex min-w-[12rem] items-center gap-3 rounded-lg border border-zinc-600/50 bg-zinc-900/40 px-3 py-2">
  <div
    class="flex h-10 w-10 shrink-0 items-center justify-center overflow-hidden rounded-full bg-zinc-700 text-sm font-medium"
  >
    <img *ngIf="contact.imageUrl" [src]="contact.imageUrl" [alt]="contact.userName" class="h-full w-full object-cover" />
    <span *ngIf="!contact.imageUrl">{{ contact.userName.slice(0, 2).toUpperCase() }}</span>
  </div>
  <div class="min-w-0 flex-1">
    <p class="truncate text-sm font-medium">{{ contact.userName }}</p>
    <p class="text-xs text-zinc-400">Contact card</p>
  </div>
</div>
