<ng-container [ngSwitch]="variant">
  <div
    *ngSwitchCase="'spinner'"
    class="flex items-center gap-2 text-zinc-400"
    [class]="containerClass"
    role="status"
    aria-live="polite"
  >
    <svg
      class="h-5 w-5 flex-shrink-0 animate-spin text-brand"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
      ></path>
    </svg>
    <span *ngIf="message" class="text-sm">{{ message }}</span>
    <span class="sr-only">Loading</span>
  </div>

  <div
    *ngSwitchCase="'skeleton'"
    class="animate-pulse"
    [class]="containerClass"
    role="status"
    aria-live="polite"
  >
    <ng-content></ng-content>
  </div>

  <div
    *ngSwitchCase="'overlay'"
    class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black/70 backdrop-blur-sm animate-fadeIn"
    role="alertdialog"
    aria-live="assertive"
    aria-busy="true"
    [class]="containerClass"
  >
    <svg
      class="mb-4 h-12 w-12 animate-spin text-brand"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
      ></path>
    </svg>
    <p *ngIf="message" class="text-lg text-white">{{ message }}</p>
    <span class="sr-only">Loading</span>
  </div>
</ng-container>
