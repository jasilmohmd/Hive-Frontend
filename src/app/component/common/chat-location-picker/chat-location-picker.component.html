<div
  class="fixed inset-0 z-40 bg-black/40 sm:absolute sm:inset-auto sm:bottom-full sm:left-0 sm:right-0 sm:mb-2 sm:bg-transparent"
  (click)="onBackdropClick()"
  role="presentation"
>
  <div
    class="absolute bottom-0 left-0 right-0 overflow-hidden rounded-t-2xl border border-zinc-700 shadow-xl sm:relative sm:bottom-auto sm:max-w-md sm:rounded-2xl"
    [ngClass]="theme === 'channel' ? 'bg-zinc-900 text-zinc-200' : 'bg-surface-900 text-zinc-200 ring-1 ring-zinc-800'"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center justify-between border-b border-zinc-700 px-3 py-2">
      <span class="text-sm font-medium">Share location</span>
      <button
        type="button"
        class="rounded-lg px-2 py-1 text-sm text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200"
        (click)="onBackdropClick()"
      >
        Close
      </button>
    </div>
    <div class="space-y-3 p-4">
      <p class="text-sm text-zinc-400">Share your current position with this chat.</p>
      <input
        type="text"
        class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm placeholder-zinc-500 focus:border-indigo-500 focus:outline-none"
        [(ngModel)]="label"
        placeholder="Label (optional), e.g. Meet here"
        maxlength="200"
      />
      <p *ngIf="error" class="text-sm text-red-400">{{ error }}</p>
      <button
        type="button"
        class="w-full rounded-lg bg-green-600 px-4 py-2 text-sm font-medium text-white hover:bg-green-500 disabled:opacity-50"
        [disabled]="loading"
        (click)="shareLocation()"
      >
        {{ loading ? 'Getting location…' : 'Share current location' }}
      </button>
    </div>
  </div>
</div>
