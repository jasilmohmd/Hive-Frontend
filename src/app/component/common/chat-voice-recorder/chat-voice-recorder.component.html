<div
  class="fixed inset-0 z-40 bg-black/40 sm:absolute sm:inset-auto sm:bottom-full sm:left-0 sm:right-0 sm:mb-2 sm:bg-transparent"
  (click)="dismiss.emit()"
  role="presentation"
>
  <div
    class="absolute bottom-0 left-0 right-0 rounded-t-2xl border border-zinc-700 bg-zinc-900 p-4 shadow-xl sm:relative sm:rounded-2xl"
    (click)="$event.stopPropagation()"
  >
    <p class="mb-3 text-sm text-zinc-400">Record a voice message (max 60s)</p>
    <p *ngIf="error" class="mb-2 text-sm text-red-400">{{ error }}</p>
    <div class="flex gap-2">
      <button
        *ngIf="!recording"
        type="button"
        class="flex-1 rounded-lg bg-red-600 py-2 text-sm text-white hover:bg-red-500"
        (click)="startRecording()"
      >
        Start recording
      </button>
      <button
        *ngIf="recording"
        type="button"
        class="flex-1 rounded-lg bg-zinc-600 py-2 text-sm text-white hover:bg-zinc-500"
        (click)="stopRecording()"
      >
        Stop & send
      </button>
      <button type="button" class="rounded-lg border border-zinc-600 px-4 py-2 text-sm" (click)="dismiss.emit()">
        Cancel
      </button>
    </div>
  </div>
</div>
