<div class="mt-1 flex flex-wrap items-center gap-1">
  <button
    *ngFor="let r of reactions"
    type="button"
    class="inline-flex items-center gap-1 rounded-full border px-2 py-0.5 text-xs"
    [ngClass]="r.reactedByMe ? 'border-indigo-500 bg-indigo-500/20' : 'border-zinc-600'"
    (click)="react.emit(r.emoji)"
  >
    <span>{{ r.emoji }}</span>
    <span class="text-zinc-400">{{ r.count }}</span>
  </button>
  <button
    type="button"
    class="rounded-full border border-zinc-600 px-2 py-0.5 text-xs text-zinc-400 hover:bg-zinc-800"
    (click)="togglePicker.emit()"
    aria-label="Add reaction"
  >
    +
  </button>
</div>
<div *ngIf="showPicker" class="mt-1 flex gap-1">
  <button
    *ngFor="let e of quickEmojis"
    type="button"
    class="rounded-lg px-2 py-1 text-lg hover:bg-zinc-800"
    (click)="react.emit(e)"
  >
    {{ e }}
  </button>
</div>
