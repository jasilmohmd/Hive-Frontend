<ng-container *ngIf="!thumbnailError; else brokenThumb">
  <button
    type="button"
    class="group relative mt-1 block w-full max-w-full overflow-hidden rounded-xl bg-surface-800 ring-1 ring-white/10 outline-none focus-visible:ring-2 focus-visible:ring-brand"
    (click)="openLightbox()"
    [attr.aria-label]="'View larger image: ' + alt"
  >
    <img
      [src]="src"
      [alt]="alt"
      loading="lazy"
      class="max-h-[min(50vh,360px)] w-full cursor-zoom-in object-contain transition-opacity group-hover:opacity-95"
      (error)="onThumbnailError()"
    />
  </button>
</ng-container>

<ng-template #brokenThumb>
  <div
    class="mt-1 flex min-h-[120px] items-center justify-center rounded-xl bg-surface-800 px-4 py-6 text-center text-sm text-zinc-400 ring-1 ring-white/10"
    role="status"
  >
    Could not load image
  </div>
</ng-template>

<div
  *ngIf="lightboxOpen"
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/85 p-4 backdrop-blur-sm"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="'Image preview: ' + alt"
  (click)="closeLightbox()"
>
  <button
    #closeBtn
    type="button"
    class="absolute right-4 top-4 z-[101] rounded-lg bg-surface-800 px-3 py-2 text-sm text-white hover:bg-surface-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand"
    (click)="closeLightbox(); $event.stopPropagation()"
    aria-label="Close image preview"
  >
    Close
  </button>

  <a
    *ngIf="isAbsoluteHttpUrl(src)"
    [href]="src"
    target="_blank"
    rel="noopener noreferrer"
    class="absolute left-4 top-4 z-[101] rounded-lg bg-surface-800 px-3 py-2 text-sm text-brand hover:bg-surface-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand"
    (click)="$event.stopPropagation()"
  >
    Open original
  </a>

  <img
    [src]="src"
    [alt]="alt"
    class="max-h-[90vh] max-w-full rounded-lg object-contain shadow-2xl ring-1 ring-white/10"
    (click)="$event.stopPropagation()"
  />
</div>
