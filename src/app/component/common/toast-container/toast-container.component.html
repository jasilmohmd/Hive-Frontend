<div
  class="pointer-events-none fixed bottom-4 right-4 z-[200] flex max-w-sm flex-col gap-2"
  aria-live="polite"
  aria-relevant="additions"
>
  <div
    *ngFor="let t of (toast.toasts$ | async)"
    class="pointer-events-auto flex items-start gap-2 rounded-lg border px-4 py-3 text-sm shadow-lg animate-fadeIn"
    [ngClass]="{
      'border-success/40 bg-surface-900 text-zinc-100': t.type === 'success',
      'border-danger/50 bg-surface-900 text-red-200': t.type === 'error',
      'border-zinc-600 bg-surface-900 text-zinc-200': t.type === 'info'
    }"
    role="status"
  >
    <span class="flex-1">{{ t.message }}</span>
    <button
      type="button"
      class="rounded text-zinc-400 hover:text-white focus-visible:ring-2 focus-visible:ring-brand"
      (click)="toast.dismiss(t.id)"
      [attr.aria-label]="'Dismiss notification'"
    >
      &times;
    </button>
  </div>
</div>
