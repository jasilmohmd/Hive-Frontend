<div
  *ngIf="visible"
  class="fixed inset-0 z-50 flex flex-col bg-zinc-950/95 backdrop-blur-sm"
  role="dialog"
  aria-label="Voice or video call"
>
  <div class="flex flex-1 flex-col items-center justify-center gap-4 p-6">
    <p class="text-lg font-medium text-zinc-100">{{ peerName }}</p>
    <p
      class="text-sm"
      [class.text-zinc-400]="callState !== 'unavailable'"
      [class.text-amber-300]="callState === 'unavailable'"
    >
      <ng-container *ngIf="callState === 'incoming'; else callStatus">
        Incoming {{ callType === 'video' ? 'video' : 'voice' }} call — use the dialog to answer
      </ng-container>
      <ng-template #callStatus>{{ statusLabel() }}</ng-template>
    </p>

    <!-- Always in DOM so voice calls can play remote audio (video element is video-only in template) -->
    <audio #remoteAudio autoplay playsinline class="remote-call-audio"></audio>

    <div
      class="relative flex w-full max-w-3xl flex-1 items-center justify-center overflow-hidden rounded-2xl bg-zinc-900"
    >
      <video
        #remoteVideo
        *ngIf="callType === 'video'"
        class="h-full max-h-[50vh] w-full object-cover"
        autoplay
        playsinline
      ></video>
      <div
        *ngIf="callType === 'audio' || (callType === 'video' && !hasRemoteVideo)"
        class="flex h-40 w-40 items-center justify-center rounded-full bg-surface-700 text-4xl font-semibold text-zinc-200"
      >
        {{ peerName.slice(0, 2).toUpperCase() }}
      </div>

      <video
        #localVideo
        *ngIf="callType === 'video'"
        class="absolute bottom-4 right-4 h-28 w-40 rounded-xl border border-white/20 object-cover shadow-lg"
        autoplay
        playsinline
        muted
      ></video>
    </div>
  </div>

  <div class="flex shrink-0 items-center justify-center gap-4 border-t border-zinc-800 p-6">
    <ng-container *ngIf="callState !== 'unavailable'; else unavailableActions">
    <button
      type="button"
      (click)="toggleMute()"
      class="rounded-full bg-surface-700 px-5 py-3 text-sm font-medium text-zinc-100 hover:bg-zinc-600"
      [attr.aria-label]="muted ? 'Unmute' : 'Mute'"
    >
      {{ muted ? 'Unmute' : 'Mute' }}
    </button>
    <button
      *ngIf="callType === 'video'"
      type="button"
      (click)="toggleCam()"
      class="rounded-full bg-surface-700 px-5 py-3 text-sm font-medium text-zinc-100 hover:bg-zinc-600"
      [attr.aria-label]="camOff ? 'Turn camera on' : 'Turn camera off'"
    >
      {{ camOff ? 'Camera on' : 'Camera off' }}
    </button>
    <button
      type="button"
      (click)="endCall()"
      class="rounded-full bg-red-600 px-6 py-3 text-sm font-medium text-white hover:bg-red-500"
      aria-label="End call"
    >
      End call
    </button>
    </ng-container>
    <ng-template #unavailableActions>
      <button
        type="button"
        (click)="endCall()"
        class="rounded-full bg-zinc-700 px-6 py-3 text-sm font-medium text-zinc-100 hover:bg-zinc-600"
        aria-label="Close"
      >
        Close
      </button>
    </ng-template>
  </div>
</div>
