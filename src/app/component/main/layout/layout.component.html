<div class="bg-black m-0 min-h-screen overflow-y-auto flex">

  <create-community-layout *ngIf="showCommunityCreateModal" (close)="toggleCommunityCreateModal()"></create-community-layout>

  <!-- Vertical Navigation Bar -->
  <nav class="bg-zinc-900 max-w-20 max-h-screen p-3 mx-3 my-4 rounded-3xl overflow-y-auto box-border">
    <div class="flex flex-col justify-between h-full">
      <!-- Navigation Links -->
      <ul class="text-white space-y-4">
        <li>
          <div class="mt-2 flex justify-center">
            <a href="/main/friends_section/friends" class="">
              <img src="assets/images/Logo-bg-white.png" alt="Compass" class="w-14 h-14 rounded-full flex items-center justify-center object-cover">
            </a>
          </div>
        </li>

        <li *ngFor="let community of communities">
          <div class="mt-2 flex justify-center">
            <a [routerLink]="['/main','community', community._id]" class="">
              <img [src]="getSafeUrl(community.imageUrl)" alt="Compass" class="w-14 h-14 rounded-full flex items-center justify-center object-cover">
            </a>
          </div>
        </li>
        
        <li>
          <div class="mt-2 flex justify-center">
            <button (click)="toggleCommunityCreateModal()" class="bg-[#333333] text-xs p-3 rounded-full flex items-center justify-center hover:bg-gray-700 hover:text-white">
              <img src="assets/Icons/plus.png" alt="Compass" class="w-8 h-8">
            </button>
          </div>
        </li>

      </ul>

      <!-- Footer Section in Navigation -->
<div class="mt-4 flex justify-center">
  <a href="/main/discover" class="bg-[#333333] text-xs p-3 rounded-full flex items-center justify-center hover:bg-gray-700 hover:text-white">
    <img src="assets/Icons/compass-fill.png" alt="Compass" class="w-8 h-8">
  </a>
</div>

    </div>
  </nav>

  <!-- Main Content Area -->
<div class="flex-1 flex flex-col pl-1 pr-4 py-4 text-white overflow-hidden h-screen">
  <!-- Header Section -->
  <header class="flex justify-between items-center h-20 p-3">
    <h1 class="text-3xl font-bold">Discover</h1>
    <div class="flex space-x-4">
      <p class="cursor-pointer hover:text-gray-300">Settings</p>
      <a href="/main/profile" class="cursor-pointer hover:text-gray-300">Profile</a>
    </div>
  </header>

  <!-- Main Content with Fixed Height and Scroll -->
  <div class="flex-1 rounded-2xl box-border overflow-hidden">
    <router-outlet></router-outlet>
  </div>
</div>
</div>
