<div class="fixed inset-0 flex items-center justify-center z-50">
  <!-- Backdrop with fade animation -->
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity duration-300"
    [class]="isCreating ? 'opacity-75' : 'opacity-50'" (click)="closeModal()"></div>

  <!-- Modal Content with scale animation -->
  <div class="relative bg-zinc-800 rounded-lg shadow-2xl z-50 w-full max-w-lg p-6 max-h-[90vh] flex flex-col
              transform transition-all duration-300 ease-out" [class]="isCreating ? 'scale-[1.02]' : 'scale-100'">

    <!-- Header with refined styling -->
    <div class="flex justify-between items-center pb-4 mb-4 border-b border-zinc-700/80">
      <!-- Title Section -->
      <div class="flex-1 min-w-0">
        <h2 class="text-xl font-medium text-zinc-100 tracking-tight truncate">
          {{ isCreating ? (mode === 'edit' ? 'Edit ' + title : 'Create ' + title) :( isAdding ? title : 'Manage ' + title + "s" ) }}
        </h2>
      </div>

      <!-- Action Buttons -->
      <div class="flex items-center gap-1.5 pl-4">
        <button *ngIf="addAction && !isCreating" (click)="startCreate()" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-green-100 bg-green-800/40 rounded-lg
                   hover:bg-green-800/60 transition-all duration-200
                   ring-1 ring-green-700/50 hover:ring-green-500/80
                   active:scale-[0.98]">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          <span>{{ addAction.label }}</span>
        </button>

        <button (click)="closeModal()" class="p-1.5 text-zinc-500 hover:text-zinc-300 rounded-full hover:bg-zinc-700/40
                   transition-colors duration-150 active:scale-95
                   focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Form/Table Container with smooth height transition -->
    <div class="flex-1 overflow-hidden transition-all duration-300 ease-in-out">
      <div *ngIf="isCreating; else tableView" class="animate-fade-in-up">
        <form [formGroup]="createForm" (ngSubmit)="saveNewItem()" class="space-y-4">
          <ng-container *ngFor="let field of createFields">
            <ng-container *ngIf="!field.showIf || (createForm && field.showIf(createForm.value))">
              <div class="relative group">
                <label class="block text-zinc-300 mb-2 font-medium text-sm transition-all duration-200
                             group-focus-within:text-indigo-400">
                  {{ field.label }}
                </label>
                <ng-container [ngSwitch]="field.type">
                  <!-- Select Field -->
                  <ng-container *ngSwitchCase="'select'">
                    <select formControlName="{{ field.field }}" class="w-full px-4 py-2.5 bg-zinc-900 rounded-lg text-white focus:outline-none 
                                   focus:ring-2 focus:ring-indigo-500 border border-zinc-700 hover:border-zinc-600
                                   transition-all duration-200 shadow-sm">
                      <option *ngFor="let option of field.options" [value]="option.value">
                        {{ option.label }}
                      </option>
                    </select>
                  </ng-container>

                  <!-- Checkbox Field -->
                  <ng-container *ngSwitchCase="'checkbox'">
                    <div class="flex flex-wrap gap-2">
                      <div *ngFor="let option of field.options" class="inline-flex items-center gap-1.5 px-1 py-1 rounded-md 
                hover:bg-zinc-900/30 transition-colors m-0.5">
                        <input type="checkbox" [value]="option.value" (change)="onCheckboxChange($event, field.field)"
                          [checked]="isChecked(field.field, option.value)" [disabled]="option.disabled" class="w-3.5 h-3.5 text-indigo-500 bg-zinc-800 border-zinc-600 rounded-sm 
                    focus:ring-1 focus:ring-indigo-400 focus:ring-offset-1 focus:ring-offset-zinc-800">
                        <span class="text-sm text-zinc-400 tracking-tight whitespace-nowrap">
                          {{ option.label }}
                        </span>
                      </div>
                    </div>
                  </ng-container>

                  <!-- Default Input Field -->
                  <ng-container *ngSwitchDefault>
                    <input [type]="field.type || 'text'" formControlName="{{ field.field }}"
                      placeholder="{{ field.label }}" class="w-full px-4 py-2.5 bg-zinc-900 rounded-lg text-white placeholder-zinc-500 
                                  focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-zinc-700
                                  hover:border-zinc-600 transition-all duration-200 shadow-sm">
                  </ng-container>
                </ng-container>

                <!-- Error Message with enter/leave animation -->
                <div @slideInOut *ngIf="createForm.get(field.field)?.touched && createForm.get(field.field)?.invalid"
                  class="absolute -bottom-5 left-0 text-red-400 text-sm font-medium pt-1">
                  {{ getErrorMessage(field.field) }}
                </div>
              </div>
            </ng-container>
          </ng-container>

          <!-- Form Buttons -->
          <div class="flex gap-3 pt-4">
            <button type="submit" class="px-5 py-2.5 bg-gradient-to-br from-blue-600 to-blue-700 text-white rounded-lg
                           hover:from-blue-500 hover:to-blue-600 transition-all duration-200 shadow-md
                           hover:shadow-blue-500/20 active:scale-95 flex-1">
              Save
            </button>
            <button type="button" (click)="cancelCreate()" class="px-5 py-2.5 bg-zinc-700 text-zinc-300 rounded-lg hover:bg-zinc-600 hover:text-white
                           transition-all duration-200 active:scale-95 flex-1">
              Cancel
            </button>
          </div>
        </form>
      </div>

      <ng-template #tableView>
        <div class="animate-fade-in">
          <!-- Search Input -->
          <div class="mb-4 relative group">
            <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="searchChange.emit($event)" placeholder="Search..." class="w-full px-4 py-2.5 bg-zinc-900 rounded-lg text-white placeholder-zinc-500 
                          focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-zinc-700
                          hover:border-zinc-600 transition-all duration-200 shadow-sm">
            <svg class="absolute right-3 top-3.5 w-5 h-5 text-zinc-500 group-focus-within:text-indigo-500
                       transition-colors duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>

          <!-- Table -->
          <app-common-table [data]="filteredData" [columns]="columns" [primaryActions]="primaryActions"
            [secondaryActions]="secondaryActions" [showFallbackInitial]="showFallbackInitial" (itemAction)="handleAction($event)"
            class="animate-fade-in-up">
          </app-common-table>
        </div>
      </ng-template>
    </div>
  </div>
</div>
