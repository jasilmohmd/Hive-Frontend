<div class="h-full flex flex-col bg-zinc-900 text-zinc-300">
  <!-- Chat Header -->
  <div class="flex items-center justify-between p-4 border-b border-zinc-700 bg-zinc-800">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-zinc-700 flex items-center justify-center">
        <span class="text-lg">#</span>
      </div>
      <div>
        <h2 class="font-semibold text-zinc-100">general-chat</h2>
        <p class="text-xs text-zinc-500">245 members</p>
      </div>
    </div>
    <div class="flex gap-2">
      <button class="p-2 hover:bg-zinc-700 rounded-lg transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat Messages -->
  <div class="flex-1 overflow-y-auto p-4 space-y-4">
    <!-- Message -->
    <div class="flex gap-3 group hover:bg-zinc-800/50 p-2 rounded-lg transition-colors">
      <div class="flex-shrink-0">
        <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center">
          <span class="text-sm">JD</span>
        </div>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline gap-2">
          <span class="font-medium text-indigo-400">JohnDoe</span>
          <span class="text-xs text-zinc-500">2:45 PM</span>
          <div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
            <!-- <app-common-dropdown [items]="[
              { name: 'edit', label: 'Edit', action: () => {} },
              { name: 'delete', label: 'Delete', action: () => {} }
            ]"></app-common-dropdown> -->
          </div>
        </div>
        <p class="mt-1 text-zinc-300">Hey everyone! Welcome to the general chat 🎉</p>
        <div class="mt-2 flex gap-2">
          <button class="text-xs text-zinc-500 hover:text-indigo-400">👍 12</button>
          <button class="text-xs text-zinc-500 hover:text-indigo-400">😄 3</button>
        </div>
      </div>
    </div>

    <!-- Message with File -->
    <div class="flex gap-3 group hover:bg-zinc-800/50 p-2 rounded-lg transition-colors">
      <div class="flex-shrink-0">
        <div class="w-10 h-10 rounded-full bg-zinc-700 flex items-center justify-center">
          <span class="text-sm">AI</span>
        </div>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline gap-2">
          <span class="font-medium text-zinc-100">Alice</span>
          <span class="text-xs text-zinc-500">2:47 PM</span>
        </div>
        <div class="mt-1 bg-zinc-800 p-3 rounded-lg inline-block">
          <div class="flex items-center gap-3">
            <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            <div>
              <p class="text-zinc-300">project-overview.pdf</p>
              <p class="text-xs text-zinc-500">1.2 MB</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Message Input -->
  <div class="p-4 border-t border-zinc-700 bg-zinc-800">
    <div class="flex gap-2">
      <div class="flex gap-1">
        <button class="p-2 hover:bg-zinc-700 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </button>
        <button class="p-2 hover:bg-zinc-700 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
          </svg>
        </button>
      </div>
      <input type="text" 
             placeholder="Message #general-chat"
             class="flex-1 px-4 py-2 bg-zinc-900 rounded-lg border border-zinc-700 focus:outline-none focus:border-indigo-500">
      <button class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg transition-colors">
        Send
      </button>
    </div>
  </div>
</div>
