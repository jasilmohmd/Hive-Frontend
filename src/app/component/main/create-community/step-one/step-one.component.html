<form [formGroup]="formGroup" class="space-y-6">
  <!-- Community Name Field -->
  <div>
    <label class="block text-gray-200 text-sm font-medium mb-3">Community Name</label>
    <div class="relative">
      <input type="text" formControlName="name" placeholder="Enter community name"
        class="w-full pl-4 pr-4 py-2.5 rounded-lg bg-zinc-800 border border-zinc-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-800 text-white placeholder-zinc-400 transition-colors">
    </div>
    <div *ngIf="formGroup.get('name')?.touched && formGroup.get('name')?.invalid"
      class="text-red-400 text-sm mt-2 flex items-center">
      <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
          clip-rule="evenodd" />
      </svg>
      <div>
        <span *ngIf="formGroup.get('name')?.errors?.['required']">Name is required</span>
        <span *ngIf="formGroup.get('name')?.errors?.['minlength']">Minimum 3 characters required</span>
        <span *ngIf="formGroup.get('name')?.errors?.['maxlength']">Maximum 50 characters allowed</span>
      </div>
    </div>
  </div>

  <!-- Type Field -->
  <div>
    <label class="block text-gray-200 text-sm font-medium mb-3">Community Type</label>
    <div class="relative">
      <select formControlName="type"
        class="w-full pl-4 pr-8 py-2.5 rounded-lg bg-zinc-800 border border-zinc-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-800 text-white appearance-none transition-colors">
        <option value="public">Public Community</option>
        <option value="private">Private Community</option>
      </select>
      <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
    <div *ngIf="formGroup.get('type')?.touched && formGroup.get('type')?.invalid"
      class="text-red-400 text-sm mt-2 flex items-center">
      <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
          clip-rule="evenodd" />
      </svg>
      <span>Community type is required</span>
    </div>
  </div>

  <!-- Description Field -->
  <div>
    <label class="block text-gray-200 text-sm font-medium mb-3">Description</label>
    <div class="relative">
      <textarea formControlName="description" rows="3" placeholder="Describe your community..."
        class="w-full px-4 py-2.5 rounded-lg bg-zinc-800 border border-zinc-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-800 text-white placeholder-zinc-400 transition-colors resize-none"></textarea>
    </div>
    <div class="flex justify-between items-center mt-2">
      <div *ngIf="formGroup.get('description')?.touched && formGroup.get('description')?.invalid"
        class="text-red-400 text-sm flex items-center">
        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
            clip-rule="evenodd" />
        </svg>
        <span>Maximum 500 characters</span>
      </div>
      <div class="flex justify-between text-xs text-zinc-400 mt-1">
        <span *ngIf="formGroup.get('description')?.errors?.['maxlength']" class="text-red-400">
          Exceeds 500 characters
        </span>
        <span>
          {{ formGroup.get('description')?.value?.length || 0 }}/500
        </span>
      </div>
    </div>
  </div>

  <!-- Next Button -->
  <div class="flex justify-between gap-4 border-t border-zinc-800 pt-6">
    <button  type="button" (click)="nextStep()"
      class="px-6 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-500 transition-colors flex items-center">
      <span>Continue</span>
      <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </div>
</form>
