<!-- Search Bar Section (Make it Sticky) -->
<div class="sticky top-0 z-10 bg-surface-900 transition-transform duration-300">
  <div class="flex items-center p-2">
    <input
      type="text"
      placeholder="Search pending requests..."
      [(ngModel)]="searchTerm"
      (input)="searchRequests()"
      aria-label="Search pending requests"
      class="flex-1 rounded-2xl bg-surface-700 px-4 py-2 text-white placeholder-zinc-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand"
    />
  </div>
</div>

<div class="flex min-h-0 flex-1 flex-col">
  <ng-container *ngIf="hasSearched && filteredRequests.length === 0; else pendingTable">
    <div class="flex min-h-0 flex-1 items-center justify-center p-6">
      <app-empty-state
        [embedded]="true"
        title="No pending requests"
        description="Try a different search term."
      />
    </div>
  </ng-container>
  <ng-template #pendingTable>
    <app-common-table
      [data]="filteredRequests"
      [columns]="tableColumns"
      [primaryActions]="primaryActions"
      appearance="friends"
      [showColumnHeaders]="false"
    >
    </app-common-table>
  </ng-template>
</div>
