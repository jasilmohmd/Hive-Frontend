<!-- Confirmation Modal -->
<app-common-modal
  *ngIf="confirmModalVisible"
  title="Confirmation"
  message="Are you sure you want to Unblock this user"
  (confirmed)="handleConfirmation()"
  (cancelled)="cancelConfirmation()"
>
</app-common-modal>

<!-- Search Bar Section (Make it Sticky) -->
<div class="sticky top-0 z-10 bg-surface-900 transition-transform duration-300">
  <div class="flex items-center p-2">
    <input
      type="text"
      placeholder="Search blocked users..."
      [(ngModel)]="searchTerm"
      (input)="searchBlockedUsers()"
      aria-label="Search blocked users"
      class="flex-1 rounded-2xl bg-surface-700 px-4 py-2 text-white placeholder-zinc-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand"
    />
  </div>
</div>

<div class="flex min-h-0 flex-1 flex-col">
  <ng-container *ngIf="hasSearched && filteredBlockedUsers.length === 0; else blockedTable">
    <div class="flex min-h-0 flex-1 items-center justify-center p-6">
      <app-empty-state
        [embedded]="true"
        title="No blocked users found"
        description="Try a different search term."
      />
    </div>
  </ng-container>
  <ng-template #blockedTable>
    <app-common-table
      [data]="filteredBlockedUsers"
      [columns]="tableColumns"
      [primaryActions]="primaryActions"
      appearance="friends"
      [showColumnHeaders]="false"
    >
    </app-common-table>
  </ng-template>
</div>
