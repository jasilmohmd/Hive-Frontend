<div class="bg-surface-900 rounded-2xl p-4 md:p-5 h-full flex flex-col">
  <div class="flex justify-between items-center p-3 md:p-4 bg-surface-700 rounded-2xl mb-3 sticky top-0 z-10">
    <nav class="flex flex-wrap gap-2" aria-label="Friends sections">
      <a
        routerLink="/main/friends_section/friends"
        routerLinkActive="bg-brand text-surface-950"
        [routerLinkActiveOptions]="{ exact: true }"
        class="px-3 md:px-4 py-2 bg-surface-600 text-sm rounded-xl transition-colors hover:bg-zinc-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2 focus-visible:ring-offset-surface-700"
      >
        Friends
      </a>
      <a
        routerLink="/main/friends_section/online"
        routerLinkActive="bg-brand text-surface-950"
        class="px-3 md:px-4 py-2 bg-surface-600 text-sm rounded-xl transition-colors hover:bg-zinc-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2 focus-visible:ring-offset-surface-700"
      >
        Online
      </a>
      <a
        routerLink="/main/friends_section/pending"
        routerLinkActive="bg-brand text-surface-950"
        class="px-3 md:px-4 py-2 bg-surface-600 text-sm rounded-xl transition-colors hover:bg-zinc-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2 focus-visible:ring-offset-surface-700"
      >
        Pending
      </a>
      <a
        routerLink="/main/friends_section/blocked"
        routerLinkActive="bg-brand text-surface-950"
        class="px-3 md:px-4 py-2 bg-surface-600 text-sm rounded-xl transition-colors hover:bg-zinc-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2 focus-visible:ring-offset-surface-700"
      >
        Blocked
      </a>
      <a
        routerLink="/main/friends_section/addfriend"
        routerLinkActive="bg-success text-white"
        class="px-3 md:px-4 py-2 bg-surface-600 text-sm rounded-xl transition-colors hover:bg-zinc-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-success focus-visible:ring-offset-2 focus-visible:ring-offset-surface-700"
      >
        Add Friend
      </a>
    </nav>
  </div>

  <div class="flex min-h-0 flex-1 flex-col overflow-y-auto overflow-x-hidden">
    <router-outlet></router-outlet>
  </div>
</div>
